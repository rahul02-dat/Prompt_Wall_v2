services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GATEWAY_API_KEYS=dev-key-change-me
      - DEFAULT_MODEL=ollama/llama3.1
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data: